<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="70%">
      <stop offset="0%" stop-color="#1a1824"/>
      <stop offset="55%" stop-color="#0e0d16"/>
      <stop offset="100%" stop-color="#07060b"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="50%">
      <stop offset="0%" stop-color="#7c6f9c" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#7c6f9c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="600" cy="260" r="340" fill="url(#glow)"/>

  <!-- ASCII cat. Line-height mirrors the live CSS (1.45) so proportions
       match the user's browser view. Winking eyes (`o.-`) for the blink
       frame. Menlo is listed first in the stack because it's the font
       rsvg-convert actually finds at build time on macOS. -->
  <text text-anchor="middle" x="600" y="210"
        font-family="Menlo, 'JetBrains Mono', 'SF Mono', monospace"
        font-size="112" font-weight="500" fill="#a99bc8">
    <tspan x="600" dy="0">/\_/\</tspan>
    <tspan x="600" dy="1.45em">( o.- )</tspan>
    <tspan x="600" dy="1.45em">&gt; ^ &lt;</tspan>
  </text>

  <!-- Wordmark -->
  <text x="600" y="595" text-anchor="middle"
        font-family="Georgia, 'Crimson Pro', serif"
        font-size="52" font-weight="300" fill="#d4d4dc" letter-spacing="-1">
    ccy
  </text>
</svg>
