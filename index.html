<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>claude-yolo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: #0a0a0a;
            color: #e5e5e5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .container {
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
        }

        .tagline {
            color: #888;
            font-size: 1.1rem;
            margin-bottom: 2.5rem;
        }

        .before-after {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin-bottom: 2.5rem;
        }

        .comparison {
            font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
            font-size: 0.9rem;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            text-align: left;
        }

        .before {
            background: #1a1010;
            border: 1px solid #332020;
            color: #cc6666;
            text-decoration: line-through;
            text-decoration-color: #cc666688;
        }

        .after {
            background: #101a10;
            border: 1px solid #203320;
            color: #66cc66;
        }

        .install-section {
            margin-bottom: 2rem;
        }

        .install-label {
            font-size: 0.85rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }

        .install-box {
            position: relative;
            background: #141414;
            border: 1px solid #2a2a2a;
            border-radius: 10px;
            padding: 1rem 3rem 1rem 1.25rem;
            font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
            font-size: 0.9rem;
            text-align: left;
            cursor: pointer;
            transition: border-color 0.2s;
            overflow-x: auto;
        }

        .install-box:hover {
            border-color: #444;
        }

        .install-box code {
            color: #e5e5e5;
            white-space: nowrap;
        }

        .copy-btn {
            position: absolute;
            right: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #666;
            cursor: pointer;
            padding: 0.25rem;
            font-size: 1.1rem;
            transition: color 0.2s;
        }

        .copy-btn:hover { color: #aaa; }

        .copy-btn.copied { color: #66cc66; }

        .note {
            color: #555;
            font-size: 0.85rem;
            margin-top: 2rem;
        }

        .links {
            margin-top: 2.5rem;
        }

        .links a {
            color: #888;
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.2s;
        }

        .links a:hover { color: #ccc; }
    </style>
</head>
<body>
    <div class="container">
        <h1>claude --yolo</h1>
        <p class="tagline">Life's too short for --dangerously-skip-permissions</p>

        <div class="before-after">
            <div class="comparison before">$ claude --dangerously-skip-permissions</div>
            <div class="comparison after">$ claude --yolo</div>
        </div>

        <div class="install-section">
            <p class="install-label">Install</p>
            <div class="install-box" onclick="copyInstall(this)">
                <code>curl -fsSL https://mochiexists.github.io/claude-yolo/install.sh | sh</code>
                <button class="copy-btn" aria-label="Copy to clipboard">&#x2398;</button>
            </div>
        </div>

        <p class="note">Open a new terminal after installing.</p>

        <div class="links">
            <a href="https://github.com/mochiexists/claude-yolo">GitHub</a>
        </div>
    </div>

    <script>
        function copyInstall(el) {
            var text = el.querySelector('code').textContent;
            navigator.clipboard.writeText(text).then(function() {
                var btn = el.querySelector('.copy-btn');
                btn.textContent = '\u2713';
                btn.classList.add('copied');
                setTimeout(function() {
                    btn.textContent = '\u2398';
                    btn.classList.remove('copied');
                }, 2000);
            });
        }
    </script>
</body>
</html>
